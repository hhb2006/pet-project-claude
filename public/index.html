<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pet Diary</title>
<link rel="stylesheet" href="/shared.css" />
</head>
<body data-title-key="app_title">
<div class="wrap">
  <div id="langSwitch"></div>
  <header class="page">
    <h1>🐾 <span data-i18n="app_title"></span></h1>
    <p data-i18n="app_tagline"></p>
  </header>

  <div class="card pet-form-card" style="margin-bottom:16px">
    <div class="step">
      <h3 data-i18n="add_pet"></h3>
      <div class="petform">
        <input type="text" id="name" data-i18n-ph="name_ph" />
        <select id="species">
          <option value="" disabled selected>Species…</option>
        </select>
        <input type="text" id="speciesOther" data-i18n-ph="species_other_ph" style="display:none" />
        <div class="breed-combobox" id="breedBox" style="display:none">
          <input type="search" id="breed" data-i18n-ph="breed_ph" autocomplete="off"
                 role="combobox" aria-autocomplete="list" aria-expanded="false"
                 aria-controls="breedOptions" />
          <div class="breed-options" id="breedOptions" role="listbox" hidden></div>
        </div>
      </div>
      <p class="hint" data-i18n="pet_hint"></p>
      <div class="rowbtns"><button id="add" data-i18n="create"></button></div>
    </div>
  </div>

  <div class="tiles" id="pets"></div>

  <p class="note" data-i18n="privacy_note"></p>
</div>

<script src="/db.js"></script>
<script src="/i18n.js"></script>
<script src="/species.js"></script>
<script src="/app.js"></script>
<script>
  const petsEl = document.getElementById("pets");
  const form = wireSpeciesBreed({
    speciesSel: document.getElementById("species"),
    speciesOther: document.getElementById("speciesOther"),
    breedBox: document.getElementById("breedBox"),
    breedInput: document.getElementById("breed"),
    breedList: document.getElementById("breedOptions"),
  });

  async function render() {
    const pets = await listPets();
    if (pets.length === 0) {
      petsEl.innerHTML = `<div class="card"><div class="empty">${t("no_pets")}<br />${t("no_pets_sub")}</div></div>`;
      return;
    }
    petsEl.innerHTML = "";
    for (const pet of pets) {
      const entries = await listEntries(pet.id);
      const docs = await listDocuments(pet.id);
      const last = entries.length ? t("last_logged", { d: fmtDate(entries[entries.length - 1].logged_at) }) : null;
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.tabIndex = 0;
      tile.setAttribute("role", "link");
      tile.setAttribute("aria-label", pet.name);
      const kind = [breedLabel(pet.species, pet.breed), speciesDisplay(pet.species)].filter(Boolean).join(" · ");
      tile.innerHTML = `
        <div class="petrow">
          <div class="avatar">${emojiFor(pet.species)}</div>
          <div class="grow">
            <h2>${esc(pet.name)}</h2>
            <p>${kind ? esc(kind) + " · " : ""}${nEntries(entries.length)} · ${nDocs(docs.length)}${last ? " · " + last : ""}</p>
          </div>
          <button class="del">${t("delete")}</button>
        </div>`;
      tile.addEventListener("click", (e) => {
        if (e.target.classList.contains("del")) return;
        location.href = `/pet.html?id=${encodeURIComponent(pet.id)}`;
      });
      tile.addEventListener("keydown", (e) => {
        if (e.target !== tile || (e.key !== "Enter" && e.key !== " ")) return;
        e.preventDefault();
        location.href = `/pet.html?id=${encodeURIComponent(pet.id)}`;
      });
      tile.querySelector(".del").addEventListener("click", async (e) => {
        e.stopPropagation();
        if (!confirm(t("confirm_delete_pet", { name: pet.name }))) return;
        await deletePet(pet.id);
        render();
      });
      petsEl.appendChild(tile);
    }
  }

  document.getElementById("add").addEventListener("click", async () => {
    const name = document.getElementById("name").value.trim();
    if (!name) { alert(t("ask_name")); return; }
    const species = form.getSpecies();
    if (!species) { alert(t("ask_species")); return; }
    await createPet({ name, species, breed: form.getBreed() });
    document.getElementById("name").value = "";
    form.reset();
    render();
  });
  document.getElementById("name").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("add").click();
  });

  (async () => {
    const migrated = await migrateLegacyLog();
    await render();
    if (migrated) {
      const n = (await listEntries(migrated.id)).length;
      alert(t("migrated", { n: nEntries(n), name: migrated.name }));
    }
  })();
</script>
</body>
</html>
