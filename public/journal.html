<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ame's Journal · Pet Behavior Journal</title>
<link rel="stylesheet" href="/shared.css" />
</head>
<body>
<div class="wrap">
  <nav id="nav"></nav>

  <header class="page">
    <h1>🐶 Ame's Journal</h1>
    <p id="greeting"></p>
  </header>

  <div class="card">
    <div class="step" id="step"></div>
  </div>

  <div class="footerbar">
    <span id="count">0 entries saved on this device</span>
    <span><a onclick="downloadJSON()">Download log (JSON)</a></span>
  </div>
  <p class="note">A gentle record of what you noticed — never a diagnosis.</p>
</div>

<script src="/app.js"></script>
<script>
  // Personalized, just like the CLI gift.
  const PET = "Ame", SPECIES = "dog", OWNER = "hhb";
  document.getElementById("greeting").textContent =
    `Hi ${OWNER} — let's take a moment to note something ${PET} did today.`;

  const stepEl = document.getElementById("step");
  const countEl = document.getElementById("count");
  const WHEN_PHRASE = { morning: "in the morning", afternoon: "in the afternoon", evening: "in the evening", overnight: "overnight" };
  const BEHAVIORS = [
    ["Barked", "barking"], ["Hid", "hiding"], ["Paced or couldn't settle", "restlessness"],
    ["Whined or cried", "whining"], ["Growled", "growling"], ["Something else", null],
  ];

  const entry = {};
  function refreshCount() {
    const n = entryCount();
    countEl.textContent = `${n} ${n === 1 ? "entry" : "entries"} saved on this device`;
  }

  // ── Steps ──────────────────────────────────────────────────────────────
  function stepBehavior() {
    stepEl.innerHTML = `<h3>What did ${PET} do?</h3><div class="options" id="opts"></div>`;
    const opts = document.getElementById("opts");
    BEHAVIORS.forEach(([label, noun]) => {
      const b = document.createElement("button");
      b.textContent = label;
      b.onclick = () => {
        if (noun === null) {
          const custom = prompt(`Tell me in your own words what ${PET} did:`);
          if (!custom) return;
          entry.behavior = custom.toLowerCase(); entry.behavior_noun = custom.toLowerCase();
        } else { entry.behavior = label.toLowerCase(); entry.behavior_noun = noun; }
        stepTrigger();
      };
      opts.appendChild(b);
    });
  }

  function stepTrigger() {
    stepEl.innerHTML = `
      <h3>Was anything going on that seemed to set ${PET} off?</h3>
      <input type="text" id="trig" placeholder="A person, a sound, a place… or leave blank" style="width:100%" />
      <p class="hint">Leave it blank if nothing stood out.</p>
      <div class="rowbtns"><button id="next">Next</button></div>`;
    const inp = document.getElementById("trig");
    inp.focus();
    document.getElementById("next").onclick = () => { entry.trigger = inp.value.trim() || null; stepWhen(); };
    inp.addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("next").click(); });
  }

  function stepWhen() {
    stepEl.innerHTML = `<h3>When did it happen?</h3><div class="options" id="opts"></div>`;
    const opts = document.getElementById("opts");
    ["Morning", "Afternoon", "Evening", "Overnight"].forEach(label => {
      const b = document.createElement("button");
      b.textContent = label;
      b.onclick = () => { entry.time_of_day = label.toLowerCase(); stepIntensity(); };
      opts.appendChild(b);
    });
  }

  function stepIntensity() {
    stepEl.innerHTML = `
      <h3>How worked up did ${PET} seem, from 1 to 10?</h3>
      <p class="hint">1 = barely bothered • 10 = extremely upset</p>
      <div class="scale" id="scale"></div>
      <div class="rowbtns"><button class="ghost" id="skip">Skip</button></div>`;
    const scale = document.getElementById("scale");
    for (let i = 1; i <= 10; i++) {
      const b = document.createElement("button");
      b.textContent = i;
      b.onclick = () => { entry.intensity = i; stepRecovery(); };
      scale.appendChild(b);
    }
    document.getElementById("skip").onclick = () => { entry.intensity = null; stepRecovery(); };
  }

  function stepRecovery() {
    stepEl.innerHTML = `
      <h3>How long until ${PET} felt like themselves again?</h3>
      <input type="text" id="rec" placeholder="'a few minutes', 'ages'… or leave blank" style="width:100%" />
      <div class="rowbtns"><button id="save">Save this moment</button></div>`;
    const inp = document.getElementById("rec");
    inp.focus();
    document.getElementById("save").onclick = () => { entry.recovery = inp.value.trim() || null; finish(); };
    inp.addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("save").click(); });
  }

  // ── Insight (verified, history-grounded — ported from the CLI) ───────────
  function findInsights(e, history) {
    const noun = e.behavior_noun;
    const same = history.filter(h => h.behavior_noun === noun);
    const facts = [];
    if (history.length === 0) {
      facts.push(`This is your very first entry for ${PET} — what a lovely place to start.`);
      return facts;
    }
    if (same.length === 0) {
      facts.push(`This is the first time you've logged ${PET}'s ${noun} — good to have it written down.`);
    } else {
      const priorTimes = same.map(h => h.time_of_day).filter(Boolean);
      if (priorTimes.length && !priorTimes.includes(e.time_of_day)) {
        const counts = {};
        priorTimes.forEach(t => counts[t] = (counts[t] || 0) + 1);
        const dom = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
        facts.push(`This is the first time you've noticed ${PET}'s ${noun} ${WHEN_PHRASE[e.time_of_day]} — most of ${PET}'s ${noun} has happened ${WHEN_PHRASE[dom]}.`);
      }
      const priorInt = same.map(h => h.intensity).filter(v => typeof v === "number");
      if (typeof e.intensity === "number" && priorInt.length) {
        const avg = priorInt.reduce((a, b) => a + b, 0) / priorInt.length;
        if (e.intensity - avg >= 2) facts.push(`${PET} seemed more worked up this time than usual for ${noun} — you noted ${e.intensity}, where before it's been around ${Math.round(avg)}.`);
        else if (avg - e.intensity >= 2) facts.push(`${PET} settled more easily this time than usual for ${noun} — you noted ${e.intensity}, where before it's been around ${Math.round(avg)}.`);
      }
    }
    if (e.trigger) {
      const tkey = e.trigger.toLowerCase();
      const seen = history.filter(h => (h.trigger || "").toLowerCase() === tkey).length;
      if (seen >= 1) facts.push(`"${e.trigger}" has come up before — that makes ${seen + 1} times now that it's stirred ${PET} up.`);
    }
    return facts.slice(0, 2);
  }

  async function warmReflection(facts) {
    try {
      const res = await fetch("/.netlify/functions/reflect", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ facts, pet: PET, owner: OWNER, species: SPECIES }),
      });
      const data = await res.json();
      if (res.ok && data.note) return data.note;
    } catch { /* fall through */ }
    return facts.join(" "); // Gentle, specific fallback — the facts stand on their own.
  }

  async function finish() {
    const history = loadLog();
    const facts = findInsights(entry, history);

    // Save into the shared log using the canonical schema (so Analyze sees it too).
    addEntry({
      logged_at: new Date().toISOString(),
      behavior_type: entry.behavior_noun,
      trigger: entry.trigger,
      timestamp: WHEN_PHRASE[entry.time_of_day],
      duration: null,
      intensity: entry.intensity,
      recovery_period: entry.recovery,
      time_of_day: entry.time_of_day,
    });
    refreshCount();

    stepEl.innerHTML = `<h3>✓ Saved. Thank you.</h3><p class="hint">Here's something I noticed…</p><p id="reflect">…</p>`;
    const reflection = await warmReflection(facts);
    document.getElementById("reflect").textContent = reflection;

    const total = entryCount();
    const close = document.createElement("div");
    close.innerHTML = `
      <hr style="border:none;border-top:1px solid var(--line);margin:18px 0" />
      <p>That's ${total} ${total === 1 ? "entry" : "entries"} for ${PET} now, ${OWNER}. Little notes like
      this add up. If you can keep it going for two or three weeks, you'll have a real picture of
      ${PET}'s patterns — and that gives a vet or trainer so much more to work with than memory alone.</p>
      <p>You're doing a kind thing for ${PET}. 🐾</p>
      <div class="rowbtns"><button id="again">Log another moment</button></div>`;
    stepEl.appendChild(close);
    document.getElementById("again").onclick = () => { for (const k in entry) delete entry[k]; stepBehavior(); };
  }

  refreshCount();
  stepBehavior();
</script>
</body>
</html>
