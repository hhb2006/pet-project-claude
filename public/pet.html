<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pet Diary</title>
<link rel="stylesheet" href="/shared.css" />
</head>
<body>
<div class="wrap">
  <div id="langSwitch"></div>
  <nav class="tabs backnav"><a href="/index.html" data-i18n="back_all_pets"></a></nav>

  <header class="page">
    <h1 id="petname">…</h1>
    <p id="petmeta"></p>
    <button type="button" class="linkbtn" id="editPet" data-i18n="edit_details"></button>
  </header>

  <div class="card pet-form-card" id="editCard" style="display:none; margin-bottom:16px">
    <div class="step">
      <h3 data-i18n="edit_details"></h3>
      <div class="petform">
        <input type="text" id="eName" data-i18n-ph="name_label_ph" />
        <select id="eSpecies"></select>
        <input type="text" id="eSpeciesOther" data-i18n-ph="species_other_ph" style="display:none" />
        <div class="breed-combobox" id="eBreedBox" style="display:none">
          <input type="search" id="eBreed" data-i18n-ph="breed_ph" autocomplete="off"
                 role="combobox" aria-autocomplete="list" aria-expanded="false"
                 aria-controls="eBreedOptions" />
          <div class="breed-options" id="eBreedOptions" role="listbox" hidden></div>
        </div>
      </div>
      <div class="rowbtns">
        <button id="savePet" data-i18n="save"></button>
        <button class="ghost" id="cancelEdit" data-i18n="cancel"></button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="subtabs">
      <button data-tab="chat" class="active" data-i18n="tab_chat"></button>
      <button data-tab="log" data-i18n="tab_log"></button>
      <button data-tab="docs" data-i18n="tab_docs"></button>
    </div>

    <!-- ── CHAT ────────────────────────────────────────────────────── -->
    <div id="tab-chat">
      <div class="sessionbar">
        <select id="sessionSel" data-i18n-title="your_chats"></select>
        <button type="button" class="ghost" id="newChat" data-i18n="new_chat"></button>
        <button type="button" class="ghost" id="delChat" data-i18n-title="del_chat_title">🗑</button>
      </div>
      <div class="chat">
        <div class="log" id="chatlog"></div>
        <form class="composer" id="composer">
          <textarea id="input" rows="1" autofocus></textarea>
          <button type="submit" id="send" data-i18n="send"></button>
        </form>
        <p class="choicehint" id="choicehint"></p>
      </div>
    </div>

    <!-- ── LOG (entries + the report generated from them) ──────────── -->
    <div id="tab-log" style="display:none">
      <div class="step">
        <h3 data-i18n="logged_events"></h3>
        <p class="hint" id="logCount"></p>
        <div class="rowbtns">
          <button class="ghost" id="manualLog" data-i18n="manual_add_log"></button>
          <button id="run" data-i18n="create_report"></button>
          <button class="ghost" id="dlLog" data-i18n="dl_log"></button>
        </div>
      </div>
      <div id="analyzeOut" style="display:none">
        <div id="flags"></div>
        <div class="report" id="report"></div>
        <div class="step" style="padding-top:0">
          <div class="rowbtns">
            <button id="saveReport" data-i18n="save_to_docs"></button>
            <button class="ghost" id="dlReport" data-i18n="dl_txt"></button>
            <button class="ghost" id="closeReport" data-i18n="close_report"></button>
          </div>
        </div>
      </div>
      <div class="doclist" id="entrylist"></div>
    </div>

    <!-- ── DOCUMENTS ───────────────────────────────────────────────── -->
    <div id="tab-docs" style="display:none">
      <div class="step">
        <h3 data-i18n="add_note"></h3>
        <input type="text" id="noteTitle" data-i18n-ph="note_title_ph" style="width:100%" />
        <textarea id="noteBody" rows="3" data-i18n-ph="note_body_ph" style="width:100%; margin-top:8px; max-height:none"></textarea>
        <div class="rowbtns">
          <button id="saveNote" data-i18n="save_note"></button>
          <button class="ghost" id="attachBtn" data-i18n="attach"></button>
          <input type="file" id="fileInput" style="display:none" multiple />
        </div>
        <p class="hint" data-i18n="attach_hint"></p>
      </div>
      <div class="doclist" id="doclist"></div>
    </div>

  </div>

  <p class="note" data-i18n="pet_note"></p>
</div>

<dialog class="log-dialog" id="logDialog">
  <form id="logDialogForm">
    <div class="dialog-head">
      <div>
        <h2 data-i18n="log_dialog_title"></h2>
        <p data-i18n="log_dialog_hint"></p>
      </div>
      <button type="button" class="dialog-close" id="closeLogDialog"
              data-i18n-title="close">×</button>
    </div>
    <div class="log-dialog-fields">
      <label class="ffield">
        <span data-i18n="f_behavior"></span>
        <input type="text" data-log-field="behavior_type" />
      </label>
      <label class="ffield">
        <span data-i18n="f_trigger"></span>
        <input type="text" data-log-field="trigger" />
      </label>
      <label class="ffield">
        <span data-i18n="f_when"></span>
        <input type="text" data-log-field="timestamp" />
      </label>
      <label class="ffield">
        <span data-i18n="f_duration"></span>
        <input type="text" data-log-field="duration" />
      </label>
      <label class="ffield">
        <span data-i18n="f_intensity"></span>
        <input type="number" min="1" max="10" step="1" data-log-field="intensity" />
        <small data-i18n="intensity_midpoint"></small>
      </label>
      <label class="ffield">
        <span data-i18n="f_recovery"></span>
        <input type="text" data-log-field="recovery_period" />
      </label>
    </div>
    <div class="dialog-actions">
      <button type="button" class="ghost" id="cancelLogDialog" data-i18n="cancel"></button>
      <button type="submit" id="saveLogDialog" data-i18n="save_to_log"></button>
    </div>
  </form>
</dialog>

<script src="/db.js"></script>
<script src="/i18n.js"></script>
<script src="/species.js"></script>
<script src="/app.js"></script>
<script src="/markdown.js"></script>
<script>
  const petId = new URLSearchParams(location.search).get("id");
  let pet = null;
  function petContext() { return { name: pet.name, species: pet.species, breed: pet.breed || "" }; }
  function langNow() { return getLang(); }

  // ── Tabs ────────────────────────────────────────────────────────────
  document.querySelectorAll(".subtabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".subtabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      for (const name of ["chat", "log", "docs"]) {
        document.getElementById("tab-" + name).style.display = (name === btn.dataset.tab) ? "block" : "none";
      }
      if (btn.dataset.tab === "log") renderEntries();
      if (btn.dataset.tab === "docs") renderDocs();
    });
  });

  // ── Chat: sessions ──────────────────────────────────────────────────
  const chatlog = document.getElementById("chatlog");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const sessionSel = document.getElementById("sessionSel");
  const hintEl = document.getElementById("choicehint");
  const logDialog = document.getElementById("logDialog");
  const logDialogForm = document.getElementById("logDialogForm");
  const saveLogDialog = document.getElementById("saveLogDialog");

  let session = null;
  let activeLogDraft = null;

  async function refreshSessions(selectId) {
    const sessions = await listSessions(petId);
    sessionSel.innerHTML = "";
    for (const s of sessions) {
      const o = document.createElement("option");
      o.value = s.id;
      o.textContent = `${s.title}  ·  ${fmtDate(s.updated_at)}`;
      sessionSel.appendChild(o);
    }
    if (selectId) sessionSel.value = selectId;
    sessionSel.style.display = sessions.length ? "block" : "none";
    return sessions;
  }

  async function openSession(id) {
    session = await getSession(id);
    sessionSel.value = id;
    chatlog.innerHTML = "";
    const msgs = await listMessages(id);
    if (!msgs.length) greet();
    for (const m of msgs) renderStored(m);
    setHint();
    chatlog.scrollTop = chatlog.scrollHeight;
  }

  async function newSession() {
    const s = await createSession(petId, t("new_chat_title"));
    await refreshSessions(s.id);
    await openSession(s.id);
    input.focus();
  }

  sessionSel.addEventListener("change", () => openSession(sessionSel.value));
  document.getElementById("newChat").addEventListener("click", newSession);
  document.getElementById("delChat").addEventListener("click", async () => {
    if (!session) return;
    if (!confirm(t("confirm_del_chat", { name: pet.name }))) return;
    await deleteSession(session.id);
    const rest = await refreshSessions();
    if (rest.length) await openSession(rest[0].id); else await newSession();
  });

  // ── Rendering ───────────────────────────────────────────────────────
  function greet() {
    const d = document.createElement("div");
    d.className = "msg assistant";
    d.textContent = t("greet", { name: pet.name });
    chatlog.appendChild(d);
  }

  function renderStored(m) {
    if (m.kind === "summary") return renderSummary(JSON.parse(m.content), m.id);
    if (m.role === "user") return renderUser(m);
    return m.kind === "log" ? bubble(m.content, "assistant") : renderAdvice(m);
  }

  function bubble(text, cls) {
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    chatlog.appendChild(d);
    chatlog.scrollTop = chatlog.scrollHeight;
    return d;
  }

  function adviceBubble(text) {
    const d = document.createElement("div");
    d.className = "msg advice";
    renderMarkdown(d, text);
    chatlog.appendChild(d);
    chatlog.scrollTop = chatlog.scrollHeight;
    return d;
  }

  function renderAdvice(m) {
    const bubble = adviceBubble(m.content);
    if (m.log_candidate?.detected && !m.log_dismissed) renderEventCard(m);
    return bubble;
  }

  function renderUser(m) {
    return bubble(m.content, "user");
  }

  function summaryHTML(r) {
    return `
      <h3>${t("written_down", { name: esc(pet.name) })}</h3>
      <dl>
        <dt>${t("f_behavior")}</dt><dd>${esc(fmt(r.behavior_type))}</dd>
        <dt>${t("f_trigger")}</dt><dd>${esc(fmt(r.trigger))}</dd>
        <dt>${t("f_when")}</dt><dd>${esc(fmt(r.timestamp))}</dd>
        <dt>${t("f_duration")}</dt><dd>${esc(fmt(r.duration))}</dd>
        <dt>${t("f_intensity")}</dt><dd>${esc(fmt(r.intensity))}</dd>
        <dt>${t("f_recovery")}</dt><dd>${esc(fmt(r.recovery_period))}</dd>
      </dl>`;
  }

  function renderSummary(r, msgId) {
    const wrap = document.createElement("div");
    wrap.className = "msg summary";
    if (msgId) wrap.dataset.summaryId = msgId;
    wrap.innerHTML = summaryHTML(r);
    chatlog.appendChild(wrap);
    chatlog.scrollTop = chatlog.scrollHeight;
  }

  function typing(on) {
    let el = document.getElementById("typing");
    if (on && !el) {
      el = document.createElement("div");
      el.id = "typing"; el.className = "typing"; el.textContent = t("thinking");
      chatlog.appendChild(el); chatlog.scrollTop = chatlog.scrollHeight;
    } else if (!on && el) el.remove();
  }
  function busy(on) { sendBtn.disabled = on; }
  function setHint() { hintEl.textContent = t("hint_free"); }

  async function say(role, kind, content, entry_id = null, log_candidate = null) {
    const m = await addMessage(session.id, petId, {
      role, kind, content, entry_id, log_candidate,
    });
    renderStored(m);
    return m;
  }

  // ── Sending ─────────────────────────────────────────────────────────
  document.getElementById("composer").addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;
    input.value = ""; input.style.height = "auto";

    if (!session) await newSession();
    if (session.title === "New chat") {
      session = await touchSession(session, { title: text.slice(0, 40) + (text.length > 40 ? "…" : "") });
      await refreshSessions(session.id);
    } else {
      session = await touchSession(session);
    }

    await say("user", "advice", text);
    await runAdvice();
  });

  async function runAdvice() {
    typing(true); busy(true);
    try {
      // Keep the saved advice thread coherent across turns.
      const storedMessages = await listMessages(session.id);
      const history = storedMessages
        .filter(m => m.kind === "advice")
        .map(m => ({ role: m.role, content: m.content }));
      const knownEvents = storedMessages
        .filter(m => m.log_candidate?.detected)
        .map(m => m.log_candidate);
      const res = await fetch("/.netlify/functions/advise", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({
          messages: history,
          known_events: knownEvents,
          pet: petContext(),
          lang: langNow(),
        }),
      });
      const data = await res.json();
      typing(false);
      if (!res.ok) { bubble(data.error || t("err_generic"), "assistant").classList.add("error"); return; }
      await say("assistant", "advice", data.reply, null, data.log_candidate || null);
    } catch {
      typing(false);
      bubble(t("err_unreachable"), "assistant").classList.add("error");
    } finally { busy(false); }
  }

  // A card appears only when the assistant identifies a new concrete event.
  // The card and its entry share one message ID, so reopening it edits rather
  // than creating another entry.
  function renderEventCard(m) {
    const card = document.createElement("div");
    card.className = "event-card" + (m.entry_id ? " saved" : "");
    card.dataset.msgId = m.id;

    const copy = document.createElement("div");
    copy.className = "event-card-copy";
    const title = document.createElement("strong");
    title.textContent = m.entry_id ? t("event_logged_title") : t("event_candidate_title");
    const summary = document.createElement("span");
    summary.textContent = m.log_candidate.behavior_type || t("event_fallback");
    copy.appendChild(title);
    copy.appendChild(summary);
    card.appendChild(copy);

    const actions = document.createElement("div");
    actions.className = "event-card-actions";
    if (m.entry_id) {
      const view = document.createElement("button");
      view.type = "button";
      view.className = "ghost";
      view.textContent = t("view_log");
      view.onclick = () => openCandidateLog(m);
      actions.appendChild(view);
    } else {
      const dismiss = document.createElement("button");
      dismiss.type = "button";
      dismiss.className = "ghost";
      dismiss.textContent = t("not_now");
      dismiss.onclick = async () => {
        m.log_dismissed = true;
        await updateMessage(m.id, { log_dismissed: true });
        card.remove();
      };
      const complete = document.createElement("button");
      complete.type = "button";
      complete.textContent = t("complete_and_log");
      complete.onclick = () => openCandidateLog(m);
      actions.appendChild(dismiss);
      actions.appendChild(complete);
    }
    card.appendChild(actions);
    chatlog.appendChild(card);
    chatlog.scrollTop = chatlog.scrollHeight;
    return card;
  }

  async function openCandidateLog(m) {
    let record = m.log_candidate;
    if (m.entry_id) {
      const entry = await getEntry(m.entry_id);
      if (entry) record = entry;
      else {
        m.entry_id = null;
        await markMessageLogged(m.id, null);
      }
    }
    openLogDialog(m, record);
  }

  function openLogDialog(m, record = {}) {
    activeLogDraft = { message: m };
    logDialog.querySelectorAll("[data-log-field]").forEach(field => {
      field.value = record[field.dataset.logField] ?? "";
    });
    logDialog.showModal();
    logDialog.querySelector('[data-log-field="behavior_type"]').focus();
  }

  function closeLogDialog() {
    if (logDialog.open) logDialog.close();
  }

  document.getElementById("closeLogDialog").onclick = closeLogDialog;
  document.getElementById("cancelLogDialog").onclick = closeLogDialog;
  logDialog.addEventListener("close", () => { activeLogDraft = null; });
  logDialog.addEventListener("click", event => {
    if (event.target !== logDialog) return;
    const rect = logDialog.getBoundingClientRect();
    const inside = event.clientX >= rect.left && event.clientX <= rect.right &&
      event.clientY >= rect.top && event.clientY <= rect.bottom;
    if (!inside) closeLogDialog();
  });

  logDialogForm.addEventListener("submit", async event => {
    event.preventDefault();
    if (!activeLogDraft || saveLogDialog.disabled) return;

    const fields = {};
    logDialog.querySelectorAll("[data-log-field]").forEach(field => {
      fields[field.dataset.logField] = field.value.trim();
    });
    if (!fields.behavior_type) {
      alert(t("behavior_required"));
      logDialog.querySelector('[data-log-field="behavior_type"]').focus();
      return;
    }
    if (fields.intensity !== "" &&
        !(Number.isInteger(Number(fields.intensity)) &&
          Number(fields.intensity) >= 1 && Number(fields.intensity) <= 10)) {
      alert(t("bad_intensity"));
      logDialog.querySelector('[data-log-field="intensity"]').focus();
      return;
    }

    const draft = activeLogDraft;
    saveLogDialog.disabled = true;
    try {
      const entry = draft.message
        ? await saveEntryForMessage(petId, draft.message.id, fields)
        : await addEntry(petId, fields);
      if (!entry) throw new Error("No log entry was saved.");
      if (draft.message) draft.message.entry_id = entry.id;
      closeLogDialog();
      await refreshMeta();
      await renderEntries();
      if (draft.message && session) await openSession(session.id);
    } catch {
      alert(t("save_log_failed"));
    } finally {
      saveLogDialog.disabled = false;
    }
  });

  document.getElementById("manualLog").onclick = () => openLogDialog(null, {});

  input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = input.scrollHeight + "px"; });
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); document.getElementById("composer").requestSubmit(); }
  });

  // ── Documents ───────────────────────────────────────────────────────
  async function renderDocs() {
    const [docs, atts] = await Promise.all([listDocuments(petId), listAttachments(petId)]);
    const el = document.getElementById("doclist");
    if (!docs.length && !atts.length) {
      el.innerHTML = `<div class="empty">${t("no_docs")}<br />${t("no_docs_sub")}</div>`;
      return;
    }
    el.innerHTML = "";
    for (const d of docs) {
      const item = document.createElement("div");
      item.className = "docitem";
      item.innerHTML = `
        <h4>${d.kind === "report" ? "📄" : "📝"} ${esc(d.title)}</h4>
        <div class="meta">${d.kind === "report" ? t("doc_report") : t("doc_note")} · ${fmtDate(d.created_at)}</div>
        <details><summary>${t("read")}</summary><div class="body">${esc(d.body)}</div></details>
        <div class="actions">
          <button class="ghost dl">${t("download")}</button>
          <button class="ghost del">${t("delete")}</button>
        </div>`;
      item.querySelector(".dl").onclick = () =>
        download(d.body, `${d.title.replace(/[^a-z0-9]+/gi, "_").toLowerCase()}.txt`, "text/plain");
      item.querySelector(".del").onclick = async () => {
        if (!confirm(t("confirm_del_doc", { title: d.title }))) return;
        await deleteDocument(d.id); renderDocs(); refreshMeta();
      };
      el.appendChild(item);
    }
    for (const a of atts) {
      const item = document.createElement("div");
      item.className = "docitem";
      item.innerHTML = `
        <h4>📎 ${esc(a.name)}</h4>
        <div class="meta">${esc(a.type)} · ${fileSize(a.size)} · ${fmtDate(a.created_at)}</div>
        <div class="actions">
          <button class="ghost dl">${t("download")}</button>
          <button class="ghost del">${t("delete")}</button>
        </div>`;
      item.querySelector(".dl").onclick = () => download(a.blob, a.name);
      item.querySelector(".del").onclick = async () => {
        if (!confirm(t("confirm_del_doc", { title: a.name }))) return;
        await deleteAttachment(a.id); renderDocs();
      };
      el.appendChild(item);
    }
  }

  document.getElementById("saveNote").addEventListener("click", async () => {
    const title = document.getElementById("noteTitle").value.trim();
    const body = document.getElementById("noteBody").value.trim();
    if (!title && !body) return;
    await addDocument(petId, { kind: "note", title: title || t("note_fallback"), body });
    document.getElementById("noteTitle").value = "";
    document.getElementById("noteBody").value = "";
    renderDocs(); refreshMeta();
  });
  document.getElementById("attachBtn").addEventListener("click", () => document.getElementById("fileInput").click());
  document.getElementById("fileInput").addEventListener("change", async (e) => {
    for (const file of e.target.files) await addAttachment(petId, file);
    e.target.value = "";
    renderDocs();
  });

  // ── Log: the entries added from chat ────────────────────────────────
  async function renderEntries() {
    const entries = (await listEntries(petId)).slice().reverse(); // newest first
    const n = entries.length;
    document.getElementById("logCount").textContent = n === 0
      ? t("nothing_logged", { name: pet.name })
      : nEvents(n);
    document.getElementById("run").disabled = n === 0;
    document.getElementById("dlLog").disabled = n === 0;

    const el = document.getElementById("entrylist");
    if (!n) {
      el.innerHTML = `<div class="empty">${t("no_entries")}<br />${t("no_entries_sub", { name: esc(pet.name) })}</div>`;
      return;
    }
    el.innerHTML = "";
    for (const e of entries) {
      const item = document.createElement("div");
      item.className = "docitem";
      item.innerHTML = `
        <h4>🐾 ${esc(fmt(e.behavior_type))}</h4>
        <div class="meta">${fmtDate(e.logged_at)}${e.edited_at ? " · " + t("edited") : ""}${e.trigger ? " · " + t("trigger_label") + ": " + esc(e.trigger) : ""}</div>
        <dl class="entryfields">
          <dt>${t("f_when")}</dt><dd>${esc(fmt(e.timestamp))}</dd>
          <dt>${t("f_duration")}</dt><dd>${esc(fmt(e.duration))}</dd>
          <dt>${t("f_intensity")}</dt><dd>${esc(fmt(e.intensity))}</dd>
          <dt>${t("f_recovery")}</dt><dd>${esc(fmt(e.recovery_period))}</dd>
        </dl>
        <div class="actions">
          <button class="ghost edit">${t("edit")}</button>
          <button class="ghost del">${t("delete")}</button>
        </div>`;
      item.querySelector(".edit").onclick = () => editEntry(item, e);
      item.querySelector(".del").onclick = async () => {
        if (!confirm(t("confirm_del_entry"))) return;
        await deleteEntry(e.id);
        await renderEntries();
        await refreshMeta();
        if (session) await openSession(session.id);
      };
      el.appendChild(item);
    }
  }

  // Revise an entry by hand — the assistant only captures what the message
  // mentioned, so this is how the blanks get filled in (or mistakes corrected).
  function editEntry(item, e) {
    const row = (key, field, type) => `
      <label class="ffield">
        <span>${t(key)}</span>
        <input type="${type}" data-f="${field}" ${type === "number" ? 'min="1" max="10" step="1"' : ""}
               value="${esc(e[field] ?? "")}" />
      </label>`;
    item.innerHTML = `
      <div class="entryform">
        ${row("f_behavior", "behavior_type", "text")}
        ${row("f_trigger", "trigger", "text")}
        ${row("f_when", "timestamp", "text")}
        ${row("f_duration", "duration", "text")}
        ${row("f_intensity", "intensity", "number")}
        ${row("f_recovery", "recovery_period", "text")}
      </div>
      <p class="hint">${t("edit_hint")}</p>
      <div class="actions">
        <button class="save">${t("save")}</button>
        <button class="ghost cancel">${t("cancel")}</button>
      </div>`;

    item.querySelector(".cancel").onclick = () => renderEntries();
    item.querySelector(".save").onclick = async () => {
      const fields = {};
      item.querySelectorAll("[data-f]").forEach(i => { fields[i.dataset.f] = i.value; });

      const raw = String(fields.intensity ?? "").trim();
      if (raw !== "" && !(Number.isInteger(Number(raw)) && Number(raw) >= 1 && Number(raw) <= 10)) {
        alert(t("bad_intensity"));
        return;
      }
      await updateEntry(e.id, { ...fields, edited_at: new Date().toISOString() });
      await renderEntries();
      await refreshMeta();
    };
    item.querySelector("[data-f]").focus();
  }

  document.getElementById("dlLog").addEventListener("click", async () => {
    const entries = await listEntries(petId);
    download(JSON.stringify(entries, null, 2),
      `${pet.name.toLowerCase().replace(/[^a-z0-9]+/g, "_")}_log.json`, "application/json");
  });

  // ── The report, generated from the log ──────────────────────────────
  let reportText = "";

  function buildReport(meta, body) {
    const dr = meta.date_range;
    const span = (dr.first && dr.last) ? t("report_span", { a: dr.first.slice(0,10), b: dr.last.slice(0,10) }) + "\n" : "";
    return t("report_title", { name: pet.name.toUpperCase() }) + "\n" +
      t("report_generated", { d: fmtDateLong(new Date()) }) + "\n" +
      t("report_based", { n: nEntries(meta.record_count) }) + "\n" + span +
      t("report_disclaimer") + "\n" +
      "=".repeat(70) + "\n\n" + body + "\n";
  }

  document.getElementById("run").addEventListener("click", async () => {
    const runBtn = document.getElementById("run");
    runBtn.disabled = true; runBtn.textContent = t("thinking_btn");
    const out = document.getElementById("analyzeOut");
    const rep = document.getElementById("report");
    try {
      const records = await listEntries(petId);
      const res = await fetch("/.netlify/functions/analyze", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ records, pet: petContext(), lang: langNow() }),
      });
      const data = await res.json();
      if (!res.ok) {
        out.style.display = "block";
        rep.textContent = data.error || t("err_generic");
        rep.classList.add("error");
        return;
      }
      rep.classList.remove("error");
      reportText = buildReport(data, data.report_body);
      document.getElementById("flags").innerHTML = (data.flags && data.flags.length)
        ? `<div class="flags"><h4>${t("patterns_noticed")}</h4><ul>${data.flags.map(f => `<li>${esc(f)}</li>`).join("")}</ul></div>`
        : "";
      rep.textContent = reportText;
      out.style.display = "block";
      out.scrollIntoView({ behavior: "smooth", block: "nearest" });
    } catch {
      out.style.display = "block";
      rep.textContent = t("err_unreachable");
      rep.classList.add("error");
    } finally { runBtn.textContent = t("create_report"); runBtn.disabled = false; }
  });

  document.getElementById("saveReport").addEventListener("click", async () => {
    const btn = document.getElementById("saveReport");
    await addDocument(petId, { kind: "report", title: `${t("doc_report")} — ${fmtDate(new Date().toISOString())}`, body: reportText });
    btn.textContent = t("saved_check");
    setTimeout(() => btn.textContent = t("save_to_docs"), 1500);
    await refreshMeta();
  });
  document.getElementById("dlReport").addEventListener("click", () =>
    download(reportText, `${pet.name.toLowerCase()}_report_${new Date().toISOString().slice(0,10)}.txt`, "text/plain"));
  document.getElementById("closeReport").addEventListener("click", () => {
    document.getElementById("analyzeOut").style.display = "none";
  });

  // ── Editing the pet's details ───────────────────────────────────────
  const petForm = wireSpeciesBreed({
    speciesSel: document.getElementById("eSpecies"),
    speciesOther: document.getElementById("eSpeciesOther"),
    breedBox: document.getElementById("eBreedBox"),
    breedInput: document.getElementById("eBreed"),
    breedList: document.getElementById("eBreedOptions"),
  });
  const editCard = document.getElementById("editCard");

  document.getElementById("editPet").addEventListener("click", () => {
    const open = editCard.style.display !== "none";
    if (open) { editCard.style.display = "none"; return; }
    document.getElementById("eName").value = pet.name;
    petForm.setValues(pet.species, pet.breed);
    editCard.style.display = "block";
    document.getElementById("eName").focus();
  });
  document.getElementById("cancelEdit").addEventListener("click", () => editCard.style.display = "none");
  document.getElementById("savePet").addEventListener("click", async () => {
    const name = document.getElementById("eName").value.trim();
    if (!name) { alert(t("ask_name")); return; }
    const species = petForm.getSpecies();
    if (!species) { alert(t("ask_species")); return; }
    pet = await updatePet({ ...pet, name, species, breed: petForm.getBreed() });
    applyPet();
    await refreshMeta();
    await renderEntries();
    editCard.style.display = "none";
  });

  // ── Boot ────────────────────────────────────────────────────────────
  async function refreshMeta() {
    const [entries, docs] = await Promise.all([listEntries(petId), listDocuments(petId)]);
    const kind = [breedLabel(pet.species, pet.breed), speciesDisplay(pet.species)].filter(Boolean).join(" · ");
    document.getElementById("petmeta").textContent =
      `${kind ? kind + " · " : ""}${entries.length} ${entries.length === 1 ? "entry" : "entries"} · ` +
      `${docs.length} ${docs.length === 1 ? "document" : "documents"}`;
  }

  // Everything that reflects the pet's name/species, in one place so an edit
  // updates the whole page.
  function applyPet() {
    document.title = `${pet.name} · ${t("app_title")}`;
    document.getElementById("petname").textContent = pet.name;
    input.placeholder = t("chat_ph", { name: pet.name });
  }

  (async () => {
    pet = petId ? await getPet(petId) : null;
    if (!pet) { location.href = "/index.html"; return; }
    applyPet();
    await refreshMeta();

    // Pick up where you left off, or start a fresh chat.
    const sessions = await refreshSessions();
    if (sessions.length) await openSession(sessions[0].id);
    else await newSession();
  })();
</script>
</body>
</html>
