<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pet · Behavior Journal</title>
<link rel="stylesheet" href="/shared.css" />
</head>
<body>
<div class="wrap">
  <nav class="tabs"><a href="/index.html">← All pets</a></nav>

  <header class="page">
    <h1 id="petname">…</h1>
    <p id="petmeta"></p>
    <button type="button" class="linkbtn" id="editPet">Edit details</button>
  </header>

  <div class="card" id="editCard" style="display:none; margin-bottom:16px">
    <div class="step">
      <h3>Edit details</h3>
      <div class="petform">
        <input type="text" id="eName" placeholder="Name" />
        <select id="eSpecies"></select>
        <input type="text" id="eSpeciesOther" placeholder="What kind of pet?" style="display:none" />
        <select id="eBreed" style="display:none"></select>
        <input type="text" id="eBreedOther" placeholder="Breed" style="display:none" />
      </div>
      <div class="rowbtns">
        <button id="savePet">Save</button>
        <button class="ghost" id="cancelEdit">Cancel</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="subtabs">
      <button data-tab="chat" class="active">Chat</button>
      <button data-tab="log">Log</button>
      <button data-tab="docs">Documents</button>
    </div>

    <!-- ── CHAT ────────────────────────────────────────────────────── -->
    <div id="tab-chat">
      <div class="sessionbar">
        <select id="sessionSel" title="Your chats"></select>
        <button type="button" class="ghost" id="newChat">＋ New chat</button>
        <button type="button" class="ghost" id="delChat" title="Delete this chat">🗑</button>
      </div>
      <div class="chat">
        <div class="log" id="chatlog"></div>
        <form class="composer" id="composer">
          <textarea id="input" rows="1" placeholder="What happened?" autofocus></textarea>
          <button type="submit" id="send">Send</button>
        </form>
        <p class="choicehint" id="choicehint"></p>
      </div>
    </div>

    <!-- ── LOG (entries + the report generated from them) ──────────── -->
    <div id="tab-log" style="display:none">
      <div class="step">
        <h3>Logged events</h3>
        <p class="hint" id="logCount"></p>
        <div class="rowbtns">
          <button id="run">Create report</button>
          <button class="ghost" id="dlLog">Download log (JSON)</button>
        </div>
      </div>
      <div id="analyzeOut" style="display:none">
        <div id="flags"></div>
        <div class="report" id="report"></div>
        <div class="step" style="padding-top:0">
          <div class="rowbtns">
            <button id="saveReport">Save to documents</button>
            <button class="ghost" id="dlReport">Download .txt</button>
            <button class="ghost" id="closeReport">Close report</button>
          </div>
        </div>
      </div>
      <div class="doclist" id="entrylist"></div>
    </div>

    <!-- ── DOCUMENTS ───────────────────────────────────────────────── -->
    <div id="tab-docs" style="display:none">
      <div class="step">
        <h3>Add a note</h3>
        <input type="text" id="noteTitle" placeholder="Title (e.g. Vet visit, 12 July)" style="width:100%" />
        <textarea id="noteBody" rows="3" placeholder="Anything you want to remember — vet visits, medication, diet changes…" style="width:100%; margin-top:8px; max-height:none"></textarea>
        <div class="rowbtns">
          <button id="saveNote">Save note</button>
          <button class="ghost" id="attachBtn">Attach a file</button>
          <input type="file" id="fileInput" style="display:none" multiple />
        </div>
        <p class="hint">Files (photos, vet paperwork) are stored in this browser only.</p>
      </div>
      <div class="doclist" id="doclist"></div>
    </div>

  </div>

  <p class="note">Saved privately in this browser. A record of what you observed — never a
     diagnosis. For anything worrying, please talk to a vet.</p>
</div>

<script src="/db.js"></script>
<script src="/species.js"></script>
<script src="/app.js"></script>
<script>
  const petId = new URLSearchParams(location.search).get("id");
  let pet = null;
  function petContext() { return { name: pet.name, species: pet.species, breed: pet.breed || "" }; }

  // ── Tabs ────────────────────────────────────────────────────────────
  document.querySelectorAll(".subtabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".subtabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      for (const t of ["chat", "log", "docs"]) {
        document.getElementById("tab-" + t).style.display = (t === btn.dataset.tab) ? "block" : "none";
      }
      if (btn.dataset.tab === "log") renderEntries();
      if (btn.dataset.tab === "docs") renderDocs();
    });
  });

  // ── Chat: sessions ──────────────────────────────────────────────────
  const chatlog = document.getElementById("chatlog");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const sessionSel = document.getElementById("sessionSel");
  const hintEl = document.getElementById("choicehint");

  let session = null;
  // While a logging flow is running, replies route to the logger instead of advice.
  let pendingLog = null;   // { sourceMsgId, messages: [...], lastQuestion }

  async function refreshSessions(selectId) {
    const sessions = await listSessions(petId);
    sessionSel.innerHTML = "";
    for (const s of sessions) {
      const o = document.createElement("option");
      o.value = s.id;
      o.textContent = `${s.title}  ·  ${shortDate(s.updated_at)}`;
      sessionSel.appendChild(o);
    }
    if (selectId) sessionSel.value = selectId;
    sessionSel.style.display = sessions.length ? "block" : "none";
    return sessions;
  }

  async function openSession(id) {
    session = await getSession(id);
    pendingLog = null;
    sessionSel.value = id;
    chatlog.innerHTML = "";
    const msgs = await listMessages(id);
    if (!msgs.length) greet();
    for (const m of msgs) renderStored(m);
    setHint();
    chatlog.scrollTop = chatlog.scrollHeight;
  }

  async function newSession() {
    const s = await createSession(petId);
    await refreshSessions(s.id);
    await openSession(s.id);
    input.focus();
  }

  sessionSel.addEventListener("change", () => openSession(sessionSel.value));
  document.getElementById("newChat").addEventListener("click", newSession);
  document.getElementById("delChat").addEventListener("click", async () => {
    if (!session) return;
    if (!confirm(`Delete this chat? Anything already added to ${pet.name}'s log stays.`)) return;
    await deleteSession(session.id);
    const rest = await refreshSessions();
    if (rest.length) await openSession(rest[0].id); else await newSession();
  });

  // ── Rendering ───────────────────────────────────────────────────────
  function greet() {
    const d = document.createElement("div");
    d.className = "msg assistant";
    d.textContent = `Tell me about ${pet.name} — ask me anything, or describe something they did. ` +
      `You can add any message to the log afterwards.`;
    chatlog.appendChild(d);
  }

  function renderStored(m) {
    if (m.kind === "summary") return renderSummary(JSON.parse(m.content));
    if (m.role === "user") return renderUser(m);
    return m.kind === "log" ? bubble(m.content, "assistant") : adviceBubble(m.content);
  }

  function bubble(text, cls) {
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    chatlog.appendChild(d);
    chatlog.scrollTop = chatlog.scrollHeight;
    return d;
  }

  function adviceBubble(text) {
    const d = document.createElement("div");
    d.className = "msg advice";
    d.innerHTML = `<span class="pill">Advice · not logged</span>`;
    const p = document.createElement("div");
    p.style.whiteSpace = "pre-wrap";
    p.textContent = text;
    d.appendChild(p);
    chatlog.appendChild(d);
    chatlog.scrollTop = chatlog.scrollHeight;
    return d;
  }

  // Every message you send carries its own "add to log" decision.
  function renderUser(m) {
    const wrap = document.createElement("div");
    wrap.className = "usergroup";
    wrap.dataset.msgId = m.id;
    const d = document.createElement("div");
    d.className = "msg user";
    d.textContent = m.content;
    wrap.appendChild(d);

    const act = document.createElement("div");
    act.className = "msgactions";
    if (m.entry_id) {
      act.innerHTML = `<span class="logged">✓ Added to log</span>`;
    } else if (m.kind === "advice") {
      const b = document.createElement("button");
      b.type = "button"; b.className = "linkbtn"; b.textContent = "＋ Add to log";
      b.onclick = () => startLogFrom(m);
      act.appendChild(b);
    }
    wrap.appendChild(act);
    chatlog.appendChild(wrap);
    chatlog.scrollTop = chatlog.scrollHeight;
    return wrap;
  }

  function renderSummary(r) {
    const wrap = document.createElement("div");
    wrap.className = "msg summary";
    wrap.innerHTML = `
      <h3>Written down for ${esc(pet.name)} 🐾</h3>
      <dl>
        <dt>Behavior</dt><dd>${esc(fmt(r.behavior_type))}</dd>
        <dt>Possible trigger</dt><dd>${esc(fmt(r.trigger))}</dd>
        <dt>When</dt><dd>${esc(fmt(r.timestamp))}</dd>
        <dt>Duration</dt><dd>${esc(fmt(r.duration))}</dd>
        <dt>Intensity (1–10)</dt><dd>${esc(fmt(r.intensity))}</dd>
        <dt>Recovery period</dt><dd>${esc(fmt(r.recovery_period))}</dd>
      </dl>`;
    chatlog.appendChild(wrap);
    chatlog.scrollTop = chatlog.scrollHeight;
  }

  function typing(on) {
    let t = document.getElementById("typing");
    if (on && !t) {
      t = document.createElement("div");
      t.id = "typing"; t.className = "typing"; t.textContent = "thinking…";
      chatlog.appendChild(t); chatlog.scrollTop = chatlog.scrollHeight;
    } else if (!on && t) t.remove();
  }
  function busy(on) { sendBtn.disabled = on; }
  function setHint() {
    hintEl.innerHTML = pendingLog
      ? `Writing this down for ${esc(pet.name)} — answer the questions above. ` +
        `<a id="cancelLog" class="linkbtn">Cancel</a>`
      : `Chat freely — nothing is saved to the log unless you add it.`;
    const c = document.getElementById("cancelLog");
    if (c) c.onclick = async () => {
      pendingLog = null;
      await say("assistant", "log", "No problem — I've left that out of the log.");
      setHint();
    };
  }

  async function say(role, kind, content, entry_id = null) {
    const m = await addMessage(session.id, petId, { role, kind, content, entry_id });
    renderStored(m);
    return m;
  }

  // ── Sending ─────────────────────────────────────────────────────────
  document.getElementById("composer").addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || sendBtn.disabled) return;
    input.value = ""; input.style.height = "auto";

    if (!session) await newSession();
    if (session.title === "New chat") {
      session = await touchSession(session, { title: text.slice(0, 40) + (text.length > 40 ? "…" : "") });
      await refreshSessions(session.id);
    } else {
      session = await touchSession(session);
    }

    if (pendingLog) {
      // This answer belongs to the logging follow-up flow.
      await say("user", "log", text);
      if (pendingLog.lastQuestion) {
        pendingLog.messages.push({ role: "assistant", content: pendingLog.lastQuestion });
        pendingLog.lastQuestion = null;
      }
      pendingLog.messages.push({ role: "user", content: text });
      await runLogger();
    } else {
      await say("user", "advice", text);
      await runAdvice();
    }
  });

  async function runAdvice() {
    typing(true); busy(true);
    try {
      // Keep the advice thread coherent: don't feed it the logging Q&A.
      const history = (await listMessages(session.id))
        .filter(m => m.kind === "advice")
        .map(m => ({ role: m.role, content: m.content }));
      const res = await fetch("/.netlify/functions/advise", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ messages: history, pet: petContext() }),
      });
      const data = await res.json();
      typing(false);
      if (!res.ok) { bubble(data.error || "Something went wrong.", "assistant").classList.add("error"); return; }
      await say("assistant", "advice", data.reply);
    } catch {
      typing(false);
      bubble("I couldn't reach the assistant just now. Please try again.", "assistant").classList.add("error");
    } finally { busy(false); }
  }

  async function startLogFrom(sourceMsg) {
    pendingLog = { sourceMsgId: sourceMsg.id, messages: [{ role: "user", content: sourceMsg.content }], lastQuestion: null };
    await say("assistant", "log", `Let's write that down for ${pet.name}.`);
    setHint();
    await runLogger();
  }

  async function runLogger() {
    typing(true); busy(true);
    try {
      const res = await fetch("/.netlify/functions/chat", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ messages: pendingLog.messages }),
      });
      const data = await res.json();
      typing(false);
      if (!res.ok) { bubble(data.error || "Something went wrong.", "assistant").classList.add("error"); return; }

      if (!data.complete && data.next_question) {
        pendingLog.lastQuestion = data.next_question;
        await say("assistant", "log", data.next_question);
        return;
      }
      const entry = await addEntry(petId, data);
      await addMessage(session.id, petId, { role: "assistant", kind: "summary", content: JSON.stringify(data), entry_id: entry.id });
      renderSummary(data);
      // Mark the original message so the decision is visible and can't be repeated.
      await markMessageLogged(pendingLog.sourceMsgId, entry.id);
      const group = chatlog.querySelector(`[data-msg-id="${pendingLog.sourceMsgId}"] .msgactions`);
      if (group) group.innerHTML = `<span class="logged">✓ Added to log</span>`;
      pendingLog = null;
      setHint();
      await refreshMeta();
    } catch {
      typing(false);
      bubble("I couldn't reach the assistant just now. Please try again.", "assistant").classList.add("error");
    } finally { busy(false); }
  }

  input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = input.scrollHeight + "px"; });
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); document.getElementById("composer").requestSubmit(); }
  });

  // ── Documents ───────────────────────────────────────────────────────
  async function renderDocs() {
    const [docs, atts] = await Promise.all([listDocuments(petId), listAttachments(petId)]);
    const el = document.getElementById("doclist");
    if (!docs.length && !atts.length) {
      el.innerHTML = `<div class="empty">No documents yet.<br />Save a report or write a note above.</div>`;
      return;
    }
    el.innerHTML = "";
    for (const d of docs) {
      const item = document.createElement("div");
      item.className = "docitem";
      item.innerHTML = `
        <h4>${d.kind === "report" ? "📄" : "📝"} ${esc(d.title)}</h4>
        <div class="meta">${d.kind === "report" ? "Report" : "Note"} · ${shortDate(d.created_at)}</div>
        <details><summary>Read</summary><div class="body">${esc(d.body)}</div></details>
        <div class="actions">
          <button class="ghost dl">Download</button>
          <button class="ghost del">Delete</button>
        </div>`;
      item.querySelector(".dl").onclick = () =>
        download(d.body, `${d.title.replace(/[^a-z0-9]+/gi, "_").toLowerCase()}.txt`, "text/plain");
      item.querySelector(".del").onclick = async () => {
        if (!confirm(`Delete "${d.title}"?`)) return;
        await deleteDocument(d.id); renderDocs(); refreshMeta();
      };
      el.appendChild(item);
    }
    for (const a of atts) {
      const item = document.createElement("div");
      item.className = "docitem";
      item.innerHTML = `
        <h4>📎 ${esc(a.name)}</h4>
        <div class="meta">${esc(a.type)} · ${fileSize(a.size)} · ${shortDate(a.created_at)}</div>
        <div class="actions">
          <button class="ghost dl">Download</button>
          <button class="ghost del">Delete</button>
        </div>`;
      item.querySelector(".dl").onclick = () => download(a.blob, a.name);
      item.querySelector(".del").onclick = async () => {
        if (!confirm(`Delete "${a.name}"?`)) return;
        await deleteAttachment(a.id); renderDocs();
      };
      el.appendChild(item);
    }
  }

  document.getElementById("saveNote").addEventListener("click", async () => {
    const title = document.getElementById("noteTitle").value.trim();
    const body = document.getElementById("noteBody").value.trim();
    if (!title && !body) return;
    await addDocument(petId, { kind: "note", title: title || "Note", body });
    document.getElementById("noteTitle").value = "";
    document.getElementById("noteBody").value = "";
    renderDocs(); refreshMeta();
  });
  document.getElementById("attachBtn").addEventListener("click", () => document.getElementById("fileInput").click());
  document.getElementById("fileInput").addEventListener("change", async (e) => {
    for (const file of e.target.files) await addAttachment(petId, file);
    e.target.value = "";
    renderDocs();
  });

  // ── Log: the entries added from chat ────────────────────────────────
  async function renderEntries() {
    const entries = (await listEntries(petId)).slice().reverse(); // newest first
    const n = entries.length;
    document.getElementById("logCount").textContent = n === 0
      ? `Nothing logged for ${pet.name} yet.`
      : `${n} logged ${n === 1 ? "event" : "events"} for ${pet.name}.`;
    document.getElementById("run").disabled = n === 0;
    document.getElementById("dlLog").disabled = n === 0;

    const el = document.getElementById("entrylist");
    if (!n) {
      el.innerHTML = `<div class="empty">No entries yet.<br />
        Chat about ${esc(pet.name)}, then choose “＋ Add to log” under any message you send.</div>`;
      return;
    }
    el.innerHTML = "";
    for (const e of entries) {
      const item = document.createElement("div");
      item.className = "docitem";
      item.innerHTML = `
        <h4>🐾 ${esc(fmt(e.behavior_type))}</h4>
        <div class="meta">${shortDate(e.logged_at)}${e.trigger ? " · trigger: " + esc(e.trigger) : ""}</div>
        <dl class="entryfields">
          <dt>When</dt><dd>${esc(fmt(e.timestamp))}</dd>
          <dt>Duration</dt><dd>${esc(fmt(e.duration))}</dd>
          <dt>Intensity (1–10)</dt><dd>${esc(fmt(e.intensity))}</dd>
          <dt>Recovery</dt><dd>${esc(fmt(e.recovery_period))}</dd>
        </dl>
        <div class="actions"><button class="ghost del">Delete</button></div>`;
      item.querySelector(".del").onclick = async () => {
        if (!confirm("Delete this entry? The chat it came from stays.")) return;
        await deleteEntry(e.id);
        await renderEntries();
        await refreshMeta();
      };
      el.appendChild(item);
    }
  }

  document.getElementById("dlLog").addEventListener("click", async () => {
    const entries = await listEntries(petId);
    download(JSON.stringify(entries, null, 2),
      `${pet.name.toLowerCase().replace(/[^a-z0-9]+/g, "_")}_log.json`, "application/json");
  });

  // ── The report, generated from the log ──────────────────────────────
  let reportText = "";

  function buildReport(meta, body) {
    const dr = meta.date_range;
    const span = (dr.first && dr.last) ? `Entries span ${dr.first.slice(0,10)} to ${dr.last.slice(0,10)}.\n` : "";
    return `BEHAVIOR OBSERVER'S REPORT — ${pet.name.toUpperCase()}\n` +
      `Generated ${new Date().toLocaleDateString(undefined, { year:"numeric", month:"long", day:"numeric" })}\n` +
      `Based on ${meta.record_count} logged ${meta.record_count === 1 ? "entry" : "entries"}.\n` + span +
      "An observational summary of what was recorded — not a medical document.\n" +
      "=".repeat(70) + "\n\n" + body + "\n";
  }

  document.getElementById("run").addEventListener("click", async () => {
    const runBtn = document.getElementById("run");
    runBtn.disabled = true; runBtn.textContent = "Thinking…";
    const out = document.getElementById("analyzeOut");
    const rep = document.getElementById("report");
    try {
      const records = await listEntries(petId);
      const res = await fetch("/.netlify/functions/analyze", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ records, pet: petContext() }),
      });
      const data = await res.json();
      if (!res.ok) {
        out.style.display = "block";
        rep.textContent = data.error || "Something went wrong.";
        rep.classList.add("error");
        return;
      }
      rep.classList.remove("error");
      reportText = buildReport(data, data.report_body);
      document.getElementById("flags").innerHTML = (data.flags && data.flags.length)
        ? `<div class="flags"><h4>Patterns noticed</h4><ul>${data.flags.map(f => `<li>${esc(f)}</li>`).join("")}</ul></div>`
        : "";
      rep.textContent = reportText;
      out.style.display = "block";
      out.scrollIntoView({ behavior: "smooth", block: "nearest" });
    } catch {
      out.style.display = "block";
      rep.textContent = "Couldn't reach the assistant. Please try again.";
      rep.classList.add("error");
    } finally { runBtn.textContent = "Create report"; runBtn.disabled = false; }
  });

  document.getElementById("saveReport").addEventListener("click", async () => {
    const btn = document.getElementById("saveReport");
    await addDocument(petId, { kind: "report", title: `Report — ${new Date().toLocaleDateString()}`, body: reportText });
    btn.textContent = "Saved ✓";
    setTimeout(() => btn.textContent = "Save to documents", 1500);
    await refreshMeta();
  });
  document.getElementById("dlReport").addEventListener("click", () =>
    download(reportText, `${pet.name.toLowerCase()}_report_${new Date().toISOString().slice(0,10)}.txt`, "text/plain"));
  document.getElementById("closeReport").addEventListener("click", () => {
    document.getElementById("analyzeOut").style.display = "none";
  });

  // ── Editing the pet's details ───────────────────────────────────────
  const petForm = wireSpeciesBreed({
    speciesSel: document.getElementById("eSpecies"),
    speciesOther: document.getElementById("eSpeciesOther"),
    breedSel: document.getElementById("eBreed"),
    breedOther: document.getElementById("eBreedOther"),
  });
  const editCard = document.getElementById("editCard");

  document.getElementById("editPet").addEventListener("click", () => {
    const open = editCard.style.display !== "none";
    if (open) { editCard.style.display = "none"; return; }
    document.getElementById("eName").value = pet.name;
    petForm.setValues(pet.species, pet.breed);
    editCard.style.display = "block";
    document.getElementById("eName").focus();
  });
  document.getElementById("cancelEdit").addEventListener("click", () => editCard.style.display = "none");
  document.getElementById("savePet").addEventListener("click", async () => {
    const name = document.getElementById("eName").value.trim();
    if (!name) { alert("What's your pet called?"); return; }
    const species = petForm.getSpecies();
    if (!species) { alert("What kind of pet are they?"); return; }
    pet = await updatePet({ ...pet, name, species, breed: petForm.getBreed() });
    applyPet();
    await refreshMeta();
    await renderEntries();
    editCard.style.display = "none";
  });

  // ── Boot ────────────────────────────────────────────────────────────
  async function refreshMeta() {
    const [entries, docs] = await Promise.all([listEntries(petId), listDocuments(petId)]);
    const kind = [pet.breed, pet.species].filter(Boolean).join(" · ");
    document.getElementById("petmeta").textContent =
      `${kind ? kind + " · " : ""}${entries.length} ${entries.length === 1 ? "entry" : "entries"} · ` +
      `${docs.length} ${docs.length === 1 ? "document" : "documents"}`;
  }

  // Everything that reflects the pet's name/species, in one place so an edit
  // updates the whole page.
  function applyPet() {
    document.title = `${pet.name} · Behavior Journal`;
    document.getElementById("petname").textContent = pet.name;
    input.placeholder = `Ask about ${pet.name}, or describe what they did…`;
  }

  (async () => {
    pet = petId ? await getPet(petId) : null;
    if (!pet) { location.href = "/index.html"; return; }
    applyPet();
    await refreshMeta();

    // Pick up where you left off, or start a fresh chat.
    const sessions = await refreshSessions();
    if (sessions.length) await openSession(sessions[0].id);
    else await newSession();
  })();
</script>
